<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Tournament Referee</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  text-align:center;
}
.container {
  max-width:420px;
  margin:auto;
}
.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}
.score {
  font-size:60px;
  margin:10px 0;
}
button {
  padding:12px 20px;
  margin:5px;
  font-size:18px;
}
input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}
.status {
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>🏓 Referee App</h2>

<div class="card">
<select id="group">
  <option value="A">Bảng A</option>
  <option value="B">Bảng B</option>
</select>

<input id="referee" placeholder="Tên trọng tài">

<input id="teamA" placeholder="Đội A">
<input id="teamB" placeholder="Đội B">
</div>

<div class="card">
<div id="scoreA" class="score">0</div>
<button onclick="add('A')">+ A</button>

<div id="scoreB" class="score">0</div>
<button onclick="add('B')">+ B</button>
</div>

<div class="card">
<button onclick="reset()">Reset</button>
</div>

<div class="status" id="status"></div>

</div>

<script>

// ===== CONFIG =====
let SHEET_URL = "https://script.google.com/macros/s/AKfycbxY9eNGQBql0fIVAyoJW4X0iTwybmTUpGvl4EGRAQ502H4R3_Qn_5TiKLO2GgcFtO-2/exec";

// ===== STATE =====
let matchId = "M" + Date.now();
let scoreA = 0;
let scoreB = 0;

// ===== UPDATE UI =====
function render() {
  document.getElementById("scoreA").innerText = scoreA;
  document.getElementById("scoreB").innerText = scoreB;
}

// ===== ADD POINT =====
function add(team) {
  if (team === "A") scoreA++;
  else scoreB++;

  render();
  save("point");
}

// ===== RESET =====
function reset() {
  scoreA = 0;
  scoreB = 0;
  matchId = "M" + Date.now();
  render();
  save("reset");
}

// ===== SAVE TO SHEET =====
function save(eventType) {

  let data = {
    matchId: matchId,
    timestamp: new Date().toLocaleString(),
    group: document.getElementById("group").value,
    referee: document.getElementById("referee").value,
    teamA: document.getElementById("teamA").value,
    teamB: document.getElementById("teamB").value,
    scoreA: scoreA,
    scoreB: scoreB,
    event: eventType
  };

  document.getElementById("status").innerText = "Đang lưu...";

  fetch(SHEET_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("status").innerText = "✓ Đã lưu";
  })
  .catch(() => {
    document.getElementById("status").innerText = "Lỗi!";
  });
}

render();

</script>

</body>
</html>
